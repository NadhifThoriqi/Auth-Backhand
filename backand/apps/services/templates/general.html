<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ subject }}</title>
  <style>
    body { margin: 0; padding: 0; background: #f0f4f8; font-family: 'Segoe UI', Arial, sans-serif; }
    .wrap { max-width: 560px; margin: 40px auto; background: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 36px 30px; text-align: center; }
    .header h1 { margin: 0; color: #fff; font-size: 22px; }
    .body { padding: 36px 32px; color: #374151; }
    .body p { font-size: 15px; line-height: 1.7; }
    .btn { display: inline-block; margin-top: 20px; padding: 13px 32px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 15px; }
    .footer { padding: 20px 32px; background: #f9fafb; text-align: center; font-size: 12px; color: #9ca3af; border-top: 1px solid #e5e7eb; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>{{ subject }}</h1>
    </div>
    <div class="body">
      <p>Halo{% if username %} <strong>{{ username }}</strong>{% endif %},</p>
      {{ body | safe }}
      {% if action_url %}
      <a href="{{ action_url }}" class="btn">{{ action_text or 'Selengkapnya' }}</a>
      {% endif %}
    </div>
    <div class="footer">
      © 2026 Email Bot — Email otomatis, jangan dibalas.
    </div>
  </div>
</body>
</html>
